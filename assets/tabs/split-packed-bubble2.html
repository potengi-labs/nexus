<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bubble4 • Sistema REDE Guilherme</title>

<style>

:root{
    --terapeutico:#3B82F6;
    --familiar:#F59E0B;
    --ambiental:#22C55E;
    --biologico:#A855F7;

    --text:#1F2937;
    --muted:#6B7280;
    --bg:#F8FAFC;
}

body{
    margin:0;
    padding:24px;
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
}

.highcharts-figure{
    width:100%;
    max-width:1400px;
    margin:auto;
}

#container{
    height:900px;
    width:100%;
}

.rede-summary{
    margin-top:24px;
    padding:24px;
    border-radius:18px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.rede-summary h3{
    margin-top:0;
}

.rede-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.rede-card{
    padding:16px;
    border-radius:12px;
    background:#f8fafc;
}

.rede-card h4{
    margin:0 0 8px;
    font-size:15px;
}

.rede-card p{
    margin:0;
    color:var(--muted);
    line-height:1.5;
}

@media(max-width:900px){

    #container{
        height:1100px;
    }

    .rede-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/highcharts-more.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<figure class="highcharts-figure">

<div id="container"></div>

<div class="rede-summary">

    <h3>Mapa Integrado de Regulação e Desenvolvimento</h3>

    <div class="rede-grid">

        <div class="rede-card">
            <h4 style="color:#3B82F6">🔵 Eixo Terapêutico</h4>
            <p>
                Recursos que favorecem expressão emocional,
                aprendizagem socioemocional e construção de autonomia.
            </p>
        </div>

        <div class="rede-card">
            <h4 style="color:#F59E0B">🟠 Eixo Familiar</h4>
            <p>
                Fatores ligados à segurança afetiva,
                pertencimento e mediação relacional.
            </p>
        </div>

        <div class="rede-card">
            <h4 style="color:#22C55E">🟢 Eixo Ambiental</h4>
            <p>
                Organização do ambiente,
                previsibilidade e suporte à participação.
            </p>
        </div>

        <div class="rede-card">
            <h4 style="color:#A855F7">🟣 Eixo Biológico</h4>
            <p>
                Bases fisiológicas que sustentam energia,
                atenção, regulação emocional e bem-estar.
            </p>
        </div>

    </div>

</div>

</figure>

<script>

Highcharts.chart('container', {

    chart: {
        type: 'packedbubble',
        backgroundColor: 'transparent',
        spacingTop: 40,
        spacingBottom: 40,
        spacingLeft: 40,
        spacingRight: 120
    },

    title: {
        text: 'Sistema REDE • Guilherme',
        style: {
            fontSize: '22px',
            fontWeight: '700'
        }
    },

    subtitle: {
        text: 'Fatores Reguladores e de Proteção ao Desenvolvimento',
        style: {
            color: '#6B7280'
        }
    },

    credits:{
        enabled:false
    },

    exporting:{
        enabled:true
    },

    tooltip: {
        useHTML: true,

        pointFormatter: function () {

            return `
            <div style="
                padding:12px;
                max-width:260px;
            ">
                <strong style="font-size:15px">
                    ${this.name}
                </strong>
                <br><br>

                <strong>Prioridade:</strong>
                ${this.value}/5

                <br><br>

                ${this.desc}
            </div>
            `;
        }
    },

    colors:[
        '#3B82F6',
        '#F59E0B',
        '#22C55E',
        '#A855F7'
    ],

    legend:{
        enabled:false
    },

    plotOptions: {

        packedbubble: {

            minSize:'12%',
            maxSize:'48%',

            zMin:1,
            zMax:5,

            layoutAlgorithm: {

                splitSeries:true,

                dragBetweenSeries:false,

                parentNodeLimit:true,

                seriesInteraction:false,

                gravitationalConstant:0.008,

                bubblePadding:12
            },

            parentNode: {
                allowPointSelect:false
            },

            parentNodeOptions: {

                marker:{
                    radius:110,
                    lineWidth:0
                },

                dataLabels:{

                    enabled:true,

                    align:'right',

                    verticalAlign:'middle',

                    x:35,

                    style:{
                        color:'#111827',
                        fontSize:'18px',
                        fontWeight:'700',
                        textOutline:'none'
                    },

                    formatter:function(){
                        return this.point.name;
                    }
                }
            },

            dataLabels: {

                enabled:true,

                formatter:function(){

                    if(this.point.value >= 4){
                        return this.point.name;
                    }

                    return '';
                },

                style: {
                    color:'#111827',
                    textOutline:'none',
                    fontWeight:'600',
                    fontSize:'12px'
                }
            }
        }
    },

    series: [

    {
        name:'🔵 Terapêutico',

        data:[

            {
                name:'Música',
                value:5,
                desc:'Principal recurso espontâneo de autorregulação emocional.'
            },

            {
                name:'Autorregulação',
                value:5,
                desc:'Reconhecimento gradual dos próprios estados emocionais.'
            },

            {
                name:'Antecipação',
                value:4,
                desc:'Preparação prévia reduz ansiedade e melhora participação.'
            },

            {
                name:'Arte',
                value:4,
                desc:'Canal importante de expressão simbólica.'
            },

            {
                name:'Psicoterapia',
                value:3,
                desc:'Suporte estruturado ao desenvolvimento emocional.'
            },

            {
                name:'Nomeação Emocional',
                value:3,
                desc:'Expansão do repertório emocional.'
            }
        ]
    },

    {
        name:'🟠 Familiar',

        data:[

            {
                name:'Comunicação',
                value:5,
                desc:'Clareza reduz incertezas.'
            },

            {
                name:'Mediação Afetiva',
                value:5,
                desc:'Facilita compreensão e segurança.'
            },

            {
                name:'Validação',
                value:4,
                desc:'Reconhecimento das emoções.'
            },

            {
                name:'Pertencimento',
                value:4,
                desc:'Fortalece identidade.'
            },

            {
                name:'Convivência',
                value:3,
                desc:'Participação na rotina familiar.'
            },

            {
                name:'Rituais',
                value:3,
                desc:'Transições mais previsíveis.'
            },

            {
                name:'Autonomia',
                value:2,
                desc:'Construção gradual de responsabilidades.'
            }
        ]
    },

    {
        name:'🟢 Ambiental',

        data:[

            {
                name:'Previsibilidade',
                value:5,
                desc:'Maior fator protetivo identificado.'
            },

            {
                name:'Programação Visual',
                value:5,
                desc:'Organização concreta da rotina.'
            },

            {
                name:'Antecipação',
                value:5,
                desc:'Reduz sobrecarga cognitiva.'
            },

            {
                name:'Espaço Seguro',
                value:4,
                desc:'Base para exploração e aprendizagem.'
            },

            {
                name:'Rotina',
                value:4,
                desc:'Sustenta estabilidade diária.'
            },

            {
                name:'Sensorial',
                value:3,
                desc:'Adequação ambiental.'
            },

            {
                name:'Ambiente Conhecido',
                value:3,
                desc:'Favorece participação.'
            }
        ]
    },

    {
        name:'🟣 Biológico',

        data:[

            {
                name:'Sono',
                value:5,
                desc:'Principal base fisiológica da regulação.'
            },

            {
                name:'Recuperação',
                value:4,
                desc:'Tempo necessário após demandas.'
            },

            {
                name:'Ansiedade',
                value:4,
                desc:'Monitoramento constante.'
            },

            {
                name:'Energia Social',
                value:3,
                desc:'Capacidade variável de interação.'
            },

            {
                name:'Estabilidade Física',
                value:3,
                desc:'Bem-estar corporal geral.'
            },

            {
                name:'Alimentação',
                value:3,
                desc:'Rotinas previsíveis favorecem equilíbrio.'
            },

            {
                name:'Acompanhamento',
                value:2,
                desc:'Monitoramento contínuo da saúde.'
            }
        ]
    }

    ]
});

</script>

</body>
</html>
