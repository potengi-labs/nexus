<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>RPG Geografia do Brasil</title>

<script src="https://code.highcharts.com/maps/highmaps.js"></script>
<script src="https://code.highcharts.com/maps/modules/accessibility.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1b2b, #050812);
    color: white;
}

/* HUD estilo RPG */
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #2d6cff;
    font-size: 14px;
}

#xpBar {
    height: 8px;
    width: 200px;
    background: #222;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 5px;
}

#xpFill {
    height: 100%;
    width: 10%;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
}

/* mapa */
#container {
    height: 100vh;
    width: 100%;
}

/* painel RPG */
#panel {
    position: fixed;
    right: 20px;
    top: 20px;
    width: 300px;
    background: rgba(10,15,25,0.92);
    border: 1px solid #2d6cff;
    border-radius: 12px;
    padding: 16px;
    display: none;
    box-shadow: 0 0 20px rgba(0,100,255,0.3);
}

#panel h2 {
    margin-top: 0;
    color: #4aa3ff;
}

.badge {
    display: inline-block;
    padding: 3px 8px;
    background: #1e90ff;
    border-radius: 6px;
    font-size: 12px;
    margin-top: 8px;
}
</style>
</head>

<body>

<!-- HUD RPG -->
<div id="hud">
    🧭 Explorador do Brasil<br>
    ⭐ XP: <span id="xp">0</span>
    <div id="xpBar"><div id="xpFill"></div></div>
</div>

<!-- painel de missão -->
<div id="panel">
    <h2 id="stateName">Estado</h2>
    <div id="info"></div>
    <div class="badge">Missão concluída</div>
</div>

<div id="container"></div>

<script>
(async () => {

    const topology = await fetch(
        "https://code.highcharts.com/mapdata/countries/br/br-all.topo.json"
    ).then(r => r.json());

    // 🌎 “lore educacional” por estado
    const lore = {
        "br-sp": { text: "São Paulo: maior centro industrial e econômico do Brasil.", xp: 10 },
        "br-rj": { text: "Rio de Janeiro: turismo, cultura e antigas capitais históricas.", xp: 10 },
        "br-am": { text: "Amazonas: maior floresta tropical do mundo e biodiversidade.", xp: 15 },
        "br-ba": { text: "Bahia: forte cultura afro-brasileira e litoral extenso.", xp: 10 },
        "br-rs": { text: "Rio Grande do Sul: pampas, pecuária e cultura gaúcha.", xp: 10 },
        "br-pa": { text: "Pará: Amazônia, rios e mineração.", xp: 12 },
        "br-df": { text: "Distrito Federal: centro político do Brasil.", xp: 15 },
        "br-mg": { text: "Minas Gerais: mineração e relevos de planalto.", xp: 10 }
    };

    let xp = 0;

    function addXP(value) {
        xp += value;
        document.getElementById("xp").innerText = xp;
        document.getElementById("xpFill").style.width = Math.min(xp, 100) + "%";
    }

    function openPanel(name, text, xpGain) {
        document.getElementById("panel").style.display = "block";
        document.getElementById("stateName").innerText = name;
        document.getElementById("info").innerText = text;
        addXP(xpGain);
    }

    Highcharts.mapChart('container', {

        chart: {
            map: topology,
            backgroundColor: "transparent"
        },

        title: {
            text: "🌎 RPG Geografia do Brasil",
            style: { color: "#ffffff" }
        },

        subtitle: {
            text: "Explore os estados e complete missões geográficas",
            style: { color: "#aaaaaa" }
        },

        mapNavigation: {
            enabled: true
        },

        colorAxis: {
            min: 0,
            max: 20,
            stops: [
                [0, "#1a3a5a"],
                [0.5, "#2d6cff"],
                [1, "#00e0ff"]
            ]
        },

        series: [{
            name: "Brasil RPG",
            data: Object.keys(lore).map(k => ({
                "hc-key": k,
                value: lore[k].xp
            })),

            states: {
                hover: {
                    color: "#ffd700"
                }
            },

            dataLabels: {
                enabled: true,
                style: {
                    color: "#ffffff",
                    textOutline: "none"
                }
            },

            point: {
                events: {
                    click: function () {

                        const key = this["hc-key"];
                        const data = lore[key];

                        if (!data) {
                            openPanel(this.name, "Região ainda não desbloqueada na sua jornada.", 5);
                            return;
                        }

                        openPanel(this.name, data.text, data.xp);
                    }
                }
            }
        }]
    });

})();
</script>

</body>
</html>
