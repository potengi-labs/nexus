<style>body {
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Segoe UI Symbol",
        sans-serif;
    background: var(--highcharts-background-color);
    color: var(--highcharts-neutral-color-100);
}

.highcharts-figure,
.highcharts-data-table table {
    min-width: 360px;
    max-width: 800px;
    margin: 1em auto;
}

/* Custom CSS for the color axis ticks and marker */
.highcharts-coloraxis .highcharts-tick {
    stroke-linecap: round;
    translate: -6px 0;
    filter:
        drop-shadow(0 0 1px rgba(0, 0, 0, 0.1))
        drop-shadow(0 1px 1px rgba(0, 0, 0, 0.09))
        drop-shadow(0 3px 2px rgba(0, 0, 0, 0.05))
        drop-shadow(0 6px 2px rgba(0, 0, 0, 0.01));
    transition: opacity 0.3s ease;
}

/* When the heatmap is hovered, hide the ticks */
.highcharts-root:has(.highcharts-tracker:hover) .highcharts-tick {
    opacity: 0;
}

.highcharts-coloraxis-marker {
    filter:
        drop-shadow(0 0 1px rgba(0, 0, 0, 0.1))
        drop-shadow(0 1px 1px rgba(0, 0, 0, 0.09))
        drop-shadow(0 3px 2px rgba(0, 0, 0, 0.05))
        drop-shadow(0 6px 2px rgba(0, 0, 0, 0.01));
}

.highcharts-description {
    background: light-dark(#f2f6f2, #323232);
    border-radius: 0 4px 4px 0;
    border-left: 2px solid light-dark(#1d6aff, #fff);
    font-size: 0.8rem;
    font-style: italic;
    padding: 8px 16px;
    margin: 2em 10px 1em;
}

.highcharts-data-table table {
    font-family: Verdana, sans-serif;
    border-collapse: collapse;
    border: 1px solid var(--highcharts-neutral-color-10, #e6e6e6);
    margin: 10px auto;
    text-align: center;
    width: 100%;
    max-width: 500px;
}

.highcharts-data-table caption {
    padding: 1em 0;
    font-size: 1.2em;
    color: var(--highcharts-neutral-color-60, #666);
}

.highcharts-data-table th {
    font-weight: 600;
    padding: 0.5em;
}

.highcharts-data-table td,
.highcharts-data-table th,
.highcharts-data-table caption {
    padding: 0.5em;
}

.highcharts-data-table thead tr,
.highcharts-data-table tbody tr:nth-child(even) {
    background: var(--highcharts-neutral-color-3, #f7f7f7);
}
</style>

<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/heatmap.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
<script src="https://code.highcharts.com/modules/export-data.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Heatmap showing employee data per weekday. Heatmaps are commonly used to
        visualize hot spots within data sets, and to show patterns or correlations.
        Due to their compact nature, they are often used with large sets of data.
    </p>
</figure>


<script>// Substring template helper for the responsive labels
Highcharts.Templating.helpers.substr = (s, from, length) =>
    s.substr(from, length);

// Create the chart
Highcharts.chart('container', {

    chart: {
        type: 'heatmap',
        plotBorderColor: '#0443E1',
        plotBorderWidth: 2,
        plotBorderRadius: 5,
        marginBottom: 25
    },

    title: {
        text: 'Simple heatmap',
        align: 'left'
    },

    subtitle: {
        text: 'Sales per employee per weekday',
        align: 'left'
    },

    xAxis: {
        categories: [
            'Alexander', 'Marie', 'Maximilian', 'Sophia', 'Lukas',
            'Maria', 'Leon', 'Anna', 'Tim', 'Laura'
        ],
        opposite: true,
        labels: {
            autoRotation: [0, -90],
            style: {
                fontSize: '0.65em'
            }
        },
        lineWidth: 1,
        lineColor: '#0443E1'
    },

    yAxis: {
        categories: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'],
        title: null,
        reversed: true,
        labels: {
            rotation: -90,
            style: {
                fontSize: '0.65em'
            }
        }
    },

    accessibility: {
        point: {
            descriptionFormat: '{(add index 1)}. ' +
                '{series.xAxis.categories.(x)} sales ' +
                '{series.yAxis.categories.(y)}, {value}.'
        }
    },

    colorAxis: {
        min: -4,
        max: 154,
        startOnTick: false,
        endOnTick: false,
        tickPixelInterval: 50,
        minColor: '#0443E111',
        maxColor: '#0443E1',
        // Dots for ticks, extended also by custom CSS
        tickColor: '#ffffff',
        tickLength: 0.1,
        tickWidth: 6,
        gridLineWidth: 0,
        marker: {
            symbol: 'circle',
            color: 'transparent',
            lineColor: '#fff',
            lineWidth: 3
        }
    },

    legend: {
        align: 'right',
        layout: 'vertical',
        symbolRadius: 6,
        margin: 0,
        verticalAlign: 'bottom',
        symbolHeight: 270
    },

    tooltip: {
        useHTML: true,
        format: `<div
                style="border-left: 3px solid {point.color}; padding-left: 8px;"
            >
            <b>{series.xAxis.categories.(point.x)}</b> sold
            <b>{point.value}</b><br>
            items on <b>{series.yAxis.categories.(point.y)}</b></div>`,
        padding: 12
    },

    series: [{
        name: 'Sales per employee',
        borderColor: '#0443E1',
        borderWidth: 1,
        data: [
            [0, 0, 10], [0, 1, 19], [0, 2, 8], [0, 3, 24], [0, 4, 67],
            [1, 0, 92], [1, 1, 58], [1, 2, 78], [1, 3, 117], [1, 4, 48],
            [2, 0, 35], [2, 1, 15], [2, 2, 123], [2, 3, 64], [2, 4, 52],
            [3, 0, 72], [3, 1, 132], [3, 2, 114], [3, 3, 19], [3, 4, 16],
            [4, 0, 38], [4, 1, 5], [4, 2, 8], [4, 3, 117], [4, 4, 115],
            [5, 0, 88], [5, 1, 32], [5, 2, 12], [5, 3, 6], [5, 4, 120],
            [6, 0, 13], [6, 1, 44], [6, 2, 88], [6, 3, 98], [6, 4, 96],
            [7, 0, 31], [7, 1, 1], [7, 2, 82], [7, 3, 32], [7, 4, 30],
            [8, 0, 85], [8, 1, 97], [8, 2, 123], [8, 3, 64], [8, 4, 84],
            [9, 0, 47], [9, 1, 114], [9, 2, 31], [9, 3, 48], [9, 4, 91]
        ],
        dataLabels: {
            enabled: true,
            style: {
                fontSize: '0.85em'
            }
        }
    }],

    responsive: {
        rules: [{
            condition: {
                maxWidth: 500
            },
            chartOptions: {
                yAxis: {
                    labels: {
                        rotation: 0,
                        format: '{substr value 0 1}'
                    }
                }
            }
        }]
    }
});</script>
