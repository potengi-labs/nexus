<script>
        webix.ready(function () {
            if (webix.env.touch) webix.ui.fullScreen();
            webix.CustomScroll.init();
            webix.Date.startOnMonday = true;
            const yearScale = { unit: "year", format: "%Y" };
            const quarterScale = {
                unit: "quarter",
                format: function (start, end) {
                    const month = start.getMonth();
                    const quarter = Math.floor(month / 3) + 1;
                    return "Q" + quarter;
                },
            };

            const monthScale = { unit: "month", format: "%M" };

            function getWeekScale(isWeekTop) {
                return {
                    unit: "week",
                    format: function (start) {
                        const parser = isWeekTop ? webix.Date.dateToStr("%d %M") : webix.Date.dateToStr("%d");
                        const wstart = webix.Date.weekStart(start);
                        const wend = webix.Date.add(
                            webix.Date.add(wstart, 1, "week", true),
                            -1,
                            "day",
                            true
                        );
                        return parser(wstart) + " - " + parser(wend);
                    },
                }
            }

            const hourScale = { unit: "hour", format: "%H:00" };

            function getScales(maxScale) {
                const scales = [];
                switch (maxScale) {
                    case "year":
                        scales.push(yearScale, quarterScale);
                        break;
                    case "quarter":
                        scales.push(quarterScale, monthScale);
                        break;
                    case "month":
                        scales.push(monthScale, getWeekScale());
                        break;
                    case "week":
                        scales.push(getWeekScale(true), { unit: "day", format: "%d" });
                        break;
                    case "day":
                        scales.push({ unit: "day", format: "%M %d" }, hourScale);
                        break;
                }
                return scales;
            }

            const cellWidths = {
                year: 240,
                quarter: 140,
                month: 80,
                week: 60,
                day: 40,
            };

            const scaleStart = getDate(-16, "day");
            const scaleEnd = getDate(7, "month");

            function resetScales(mode) {
                const localService = gantt1.getService("local");
                const currentScales = localService.getScales();
                const newScales = getScales(mode);
                const cellWidth = cellWidths[mode];

                const minScale = newScales[newScales.length - 1].unit;
                const start = webix.Date.add(scaleStart, -1, minScale, true);
                const end = webix.Date.add(scaleEnd, 1, minScale, true);

                localService.setScales(
                    start,
                    end,
                    !(mode == "day"),
                    cellWidth,
                    currentScales.cellHeight,
                    newScales
                );

                gantt1.$app.refresh();
                gantt1.getState().$batch({ top: 0, left: 0 });
            }

            class MyBackend extends gantt.services.Backend {

                tasks() {

                links() {

                resources() {

                }
                categories() {

                }
                assignments() {

                    return webix.promise.resolve({ id: webix.uid() });
                }
                updateTask() {
                    return webix.promise.resolve({});

                removeTask() {

                reorderTask(id) {

                addAssignment() {

            }
