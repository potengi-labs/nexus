<script>async function loadWiki(page){

    const container =
    document.getElementById(
        "wikiContainer"
    );

    const response =
    await fetch(
        `assets/wiki/${page}.html`
    );

    container.innerHTML =
    await response.text();

}

loadWiki("investigacoes");</script>
