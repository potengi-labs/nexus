<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa dos 4 Eixos</title>

<style>
/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f1115;
  color:#fff;
}

.tab-content{
  padding: 16px;
}

.section-header h2{
  margin:0;
  font-size: 1.4rem;
}

.section-header small{
  opacity:.7;
}

/* =========================
   VIEWPORT DO MAPA
========================= */
.map-wrapper{
  position: relative;
  width: 100%;
  height: 75vh;
  overflow: hidden;
  border-radius: 14px;
  background: #111;
  touch-action: none;
  border: 1px solid rgba(255,255,255,0.08);
}

/* imagem do mapa */
.map-image{
  position:absolute;
  top:0;
  left:0;
  width: 100%;
  height: 100%;
  transform-origin: center;
  cursor: grab;
  user-select: none;
}

/* =========================
   HOTSPOTS
========================= */
.hotspot{
  position:absolute;
  width:18px;
  height:18px;
  background:#ffcc00;
  border-radius:50%;
  border:2px solid #000;
  cursor:pointer;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px rgba(255,204,0,.7);
  transition: transform .2s;
}

.hotspot:hover{
  transform: translate(-50%, -50%) scale(1.3);
}

/* tooltip */
.tooltip{
  position:absolute;
  background:#000;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  pointer-events:none;
  opacity:0;
  transform: translateY(-6px);
  transition:.2s;
  white-space:nowrap;
}

/* =========================
   CONTROLES ZOOM
========================= */
.controls{
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:10;
}

.controls button{
  width:36px;
  height:36px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:#fff;
  cursor:pointer;
  font-size:18px;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){
  .map-wrapper{
    height: 65vh;
  }
}
</style>
</head>

<body>

<div class="tab-content">
  <div class="section-header">
    <h2>Mapa dos 4 Eixos</h2>
    <small>Mapa interativo com zoom e hotspots</small>
  </div>

  <div class="map-wrapper" id="map">

    <!-- controles -->
    <div class="controls">
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomOut()">-</button>
      <button onclick="resetMap()">⟳</button>
    </div>

    <!-- imagem -->
    <img src="../img/prisma-4-eixos_bg2.png" class="map-image" id="mapImage">

    <!-- hotspots (EXEMPLOS — ajuste posições %) -->
    <div class="hotspot" style="top:30%; left:25%;" data-text="Eixo 1: Educação"></div>
    <div class="hotspot" style="top:40%; left:70%;" data-text="Eixo 2: Saúde"></div>
    <div class="hotspot" style="top:70%; left:40%;" data-text="Eixo 3: Cultura"></div>
    <div class="hotspot" style="top:55%; left:55%;" data-text="Eixo 4: Desenvolvimento"></div>

    <!-- tooltip -->
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<script>
const map = document.getElementById("map");
const img = document.getElementById("mapImage");
const tooltip = document.getElementById("tooltip");

let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY;

/* =========================
   ZOOM
========================= */
function updateTransform(){
  img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function zoomIn(){
  scale += 0.2;
  updateTransform();
}

function zoomOut(){
  scale = Math.max(1, scale - 0.2);
  updateTransform();
}

function resetMap(){
  scale = 1;
  posX = 0;
  posY = 0;
  updateTransform();
}

/* =========================
   DRAG / PAN
========================= */
map.addEventListener("mousedown", (e)=>{
  isDragging = true;
  startX = e.clientX - posX;
  startY = e.clientY - posY;
  map.style.cursor = "grabbing";
});

window.addEventListener("mouseup", ()=>{
  isDragging = false;
  map.style.cursor = "default";
});

window.addEventListener("mousemove", (e)=>{
  if(!isDragging) return;
  posX = e.clientX - startX;
  posY = e.clientY - startY;
  updateTransform();
});

/* =========================
   TOUCH MOBILE
========================= */
map.addEventListener("touchstart", (e)=>{
  const touch = e.touches[0];
  startX = touch.clientX - posX;
  startY = touch.clientY - posY;
  isDragging = true;
});

map.addEventListener("touchmove", (e)=>{
  if(!isDragging) return;
  const touch = e.touches[0];
  posX = touch.clientX - startX;
  posY = touch.clientY - startY;
  updateTransform();
});

map.addEventListener("touchend", ()=> isDragging = false);

/* =========================
   HOTSPOTS TOOLTIP
========================= */
document.querySelectorAll(".hotspot").forEach(el=>{
  el.addEventListener("mouseenter", (e)=>{
    tooltip.style.opacity = 1;
    tooltip.innerText = el.dataset.text;
  });

  el.addEventListener("mousemove", (e)=>{
    tooltip.style.left = (e.pageX + 10) + "px";
    tooltip.style.top = (e.pageY + 10) + "px";
  });

  el.addEventListener("mouseleave", ()=>{
    tooltip.style.opacity = 0;
  });

  el.addEventListener("click", ()=>{
    alert(el.dataset.text);
  });
});
</script>

</body>
</html>
