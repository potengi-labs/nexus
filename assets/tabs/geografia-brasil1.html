Segue a versão corrigida:

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Educacional do Brasil</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f7fb;
    color: #1f2a44;
    margin: 0;
    padding: 20px;
}

.highcharts-figure {
    margin: 0 auto;
    min-width: 310px;
    max-width: 900px;
}

#container {
    height: 650px;
}

.highcharts-description {
    background: #eef3f8;
    border-left: 4px solid #1d6aff;
    padding: 12px 16px;
    font-size: 0.9rem;
    margin-top: 15px;
    border-radius: 6px;
}
</style>

<script src="https://code.highcharts.com/maps/highmaps.js"></script>
<script src="https://code.highcharts.com/maps/modules/exporting.js"></script>
<script src="https://code.highcharts.com/maps/modules/offline-exporting.js"></script>
<script src="https://code.highcharts.com/maps/modules/accessibility.js"></script>

</head>
<body>

<section class="section" id="geografia-brasil1"><div>
<figure class="highcharts-figure">
    <div id="container"></div>

    <p class="highcharts-description">
        Mapa educacional do Brasil mostrando uma simulação de densidade populacional por estado.
        Este recurso pode ser usado em aulas de Geografia para ensinar:
        distribuição populacional, concentração urbana e desigualdades regionais.
    </p>
</figure>
</section>

<script>
(async () => {

    // Mapa do Brasil (estados)
    const topology = await fetch(
        'https://code.highcharts.com/mapdata/countries/br/br-all.topo.json'
    ).then(r => r.json());

    // Dados educacionais (exemplo didático - NÃO são valores reais exatos)
    const data = [
        ['br-sp', 1000],
        ['br-rj', 900],
        ['br-mg', 700],
        ['br-ba', 600],
        ['br-rs', 500],
        ['br-pr', 520],
        ['br-pe', 480],
        ['br-ce', 450],
        ['br-pa', 300],
        ['br-am', 200],
        ['br-go', 350],
        ['br-ma', 280],
        ['br-paraiba', 260],
        ['br-es', 400],
        ['br-sc', 530],
        ['br-al', 240],
        ['br-rn', 220],
        ['br-pi', 210],
        ['br-ms', 330],
        ['br-mt', 310],
        ['br-df', 850],
        ['br-ro', 180],
        ['br-rr', 120],
        ['br-ap', 140],
        ['br-to', 160],
        ['br-se', 230],
        ['br-ac', 110]
    ];

    Highcharts.mapChart('container', {

        chart: {
            map: topology
        },

        title: {
            text: 'Geografia do Brasil – Densidade Populacional por Estado (Didático)',
            align: 'left'
        },

        subtitle: {
            text: 'Mapa educativo para ensino de distribuição populacional e regiões brasileiras',
            align: 'left'
        },

        mapNavigation: {
            enabled: true,
            buttonOptions: {
                verticalAlign: 'bottom'
            }
        },

        colorAxis: {
            min: 100,
            max: 1000,
            type: 'linear',
            stops: [
                [0, '#dff3ff'],
                [0.5, '#4aa3ff'],
                [1, '#08306b']
            ]
        },

        series: [{
            name: 'Estados do Brasil',
            states: {
                hover: {
                    color: '#ffcc00'
                }
            },
            dataLabels: {
                enabled: true,
                format: '{point.name}'
            },
            allAreas: true
        }, {
            type: 'map',
            name: 'Densidade populacional (índice didático)',
            joinBy: 'hc-key',
            data: data,
            tooltip: {
                valueSuffix: ' (índice educacional)'
            }
        }]
    });

})();
</script>

</body>
</html>
